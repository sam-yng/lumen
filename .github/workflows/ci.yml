name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Aggregate backpressure gate: Biome + tsc --noEmit + Vitest.
      # Deliberately DB-free so it runs without a live Supabase stack.
      - name: Check
        run: bun run check
