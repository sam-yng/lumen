# Backpressure gate: no commit lands unless `bun run check` is green
# (root Biome lint+format check, Turbo typecheck/test). See BACKPRESSURE.md.
pre-commit:
  commands:
    react-doctor:
      run: react_doctor_output=$(mktemp "${TMPDIR:-/tmp}/react-doctor-hook.XXXXXX"); if bunx react-doctor@latest --staged --blocking warning > "$react_doctor_output" 2>&1; then rm -f "$react_doctor_output"; else rm -f "$react_doctor_output"; printf "%s\n" "React Doctor found staged regressions." "Run bunx react-doctor@latest --staged --blocking warning to inspect." "Want them fixed? Ask your agent to run that command and resolve the findings." >&2; fi
    check:
      run: bun run check
